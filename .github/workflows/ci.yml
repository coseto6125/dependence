name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 1 * * 1"  # 週一 01:00 UTC (09:00 Taiwan)

jobs:
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Sync dependencies
        run: uv sync --all-extras --group dev --frozen

      - name: Run smoke tests
        run: uv run pytest tests/smoke_tests/ -v -m "not integration" --tb=short

      - name: Run ruff check
        run: uv run ruff check . --fix

  integration-tests:
    name: Integration Tests (network required)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[integration]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Sync dependencies
        run: uv sync --all-extras --group dev --frozen

      - name: Run all smoke tests
        run: uv run pytest tests/smoke_tests/ -v --tb=short