name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-tests:
    name: Smoke Tests (core dependencies)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --extra core --group test

      - name: Run smoke tests
        run: uv run pytest tests/smoke_tests/ -v -m "not integration" --tb=short

      - name: Run ruff check
        run: uv run ruff check tests/smoke_tests/ --fix

  # Weekly integration tests (requires network)
  integration-tests:
    name: Integration Tests (network required)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[integration]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --extra core --group test

      - name: Run all smoke tests (including network tests)
        run: uv run pytest tests/smoke_tests/ -v --tb=short